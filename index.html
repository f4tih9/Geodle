<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geotrivia - Coğrafya Oyun Platformu</title>
    <style>
        :root {
            --bg-color: #f6f3ea;
            --text-color: #1e293b;
            --card-border: #000000;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Üst Menü / Navbar */
        .navbar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .nav-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-btn {
            background: white;
            border: 2px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--card-border);
        }

        /* Ana İçerik Alanı */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            align-self: flex-start;
        }

        /* Oyun Seçim Alanı - Sadece Tek Oyun */
        .game-selection-area {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 40px;
        }

        /* Link haline getirilen oyun kartı */
        .game-link {
            text-decoration: none;
            color: inherit;
        }

        .game-card {
            border: 3px solid var(--card-border);
            border-radius: 18px;
            padding: 30px 40px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            box-shadow: 5px 5px 0px var(--card-border);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background-color: #50fa7b; /* Geodle Yeşili */
            width: 280px;
            min-height: 160px;
            box-sizing: border-box;
        }

        .game-card:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--card-border);
        }

        .game-card .icon {
            font-size: 45px;
        }
    </style>
</head>
<body>

    <!-- Üst Bar -->
    <div class="navbar">
        <div class="logo" onclick="location.reload()">🌍 Geotrivia</div>
        <div class="nav-profile">
            <span id="userGreeting">Misafir Oyuncu</span>
            <button class="profile-btn" onclick="manageProfile()" id="profileBtn">Profil Oluştur</button>
        </div>
    </div>

    <div class="container">
        <h2>Aktif Oyunlar</h2>
        
        <!-- Sadece Tek ve Özgün Geodle Kartı (Doğrudan Yeni Sekmeye Yönlendirir) -->
        <div class="game-selection-area">
            <a href="geodle.html" target="_blank" class="game-link">
                <div class="game-card">
                    <div class="icon">🟩❌</div>
                    <div>Geodle oyna</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        // Yerel Profil Sistemi
        function checkProfile() {
            let username = localStorage.getItem("gt_username");
            if (username) {
                document.getElementById("userGreeting").innerHTML = `👤 <strong>${username}</strong>`;
                document.getElementById("profileBtn").textContent = "Profili Sil";
            } else {
                document.getElementById("userGreeting").textContent = "Misafir Oyuncu";
                document.getElementById("profileBtn").textContent = "Profil Oluştur";
            }
        }

        function manageProfile() {
            let current = localStorage.getItem("gt_username");
            if (current) {
                if(confirm("Profilinizi silmek istediğinize emin misiniz?")) {
                    localStorage.removeItem("gt_username");
                    checkProfile();
                }
            } else {
                let name = prompt("Kullanıcı adı girin (Kayıt Ol):");
                if (name && name.trim() !== "") {
                    localStorage.setItem("gt_username", name.trim());
                    checkProfile();
                }
            }
        }

        window.onload = checkProfile;
    </script>
</body>
</html>
