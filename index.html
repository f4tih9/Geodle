<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geodle - Sınırsız Dünya Ülkeleri (Komşuluk Dahil)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --correct: #10b981;
            --wrong: #ef4444;
            --border: #334155;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-box {
            width: 100%;
            max-width: 900px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text);
            outline: none;
            box-sizing: border-box;
        }

        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            margin: 0;
            padding: 0;
            list-style: none;
            display: none;
        }

        .suggestions-list li {
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestions-list li:hover {
            background-color: #334155;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            background: linear-gradient(to right, #2563eb, #3b82f6);
            color: white;
            cursor: pointer;
        }

        .table-wrapper { overflow-x: auto; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, minmax(110px, 1fr));
            gap: 8px;
            text-align: center;
            min-width: 680px;
        }

        .header-cell {
            font-weight: 600;
            font-size: 13px;
            color: #94a3b8;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .cell {
            padding: 15px 5px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            animation: reveal 0.5s ease forwards;
        }

        .cell span {
            font-size: 11px;
            font-weight: normal;
            opacity: 0.85;
            margin-top: 4px;
        }

        .match { background-color: var(--correct); }
        .mismatch { background-color: var(--wrong); }

        .win-screen {
            display: none;
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid var(--correct);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #loading {
            text-align: center;
            font-size: 18px;
            color: #38bdf8;
            margin: 20px 0;
        }

        @keyframes reveal {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>GEODLE</h1>
        <p style="color: #94a3b8; margin: 5px 0 0 0;">Komşuluk ilişkileri dahil tüm dünya ülkeleri yüklendi!</p>
    </header>

    <div class="game-box">
        <div id="loading">🌍 Ülkeler ve sınır haritaları yükleniyor, lütfen bekleyin...</div>
        
        <div class="win-screen" id="winScreen">🎉 Tebrikler! Gizli ülkeyi doğru tahmin ettiniz!</div>

        <div class="controls" id="inputSection" style="display: none;">
            <div class="search-container">
                <input type="text" id="countryInput" placeholder="Ülke adı yazın (Örn: Türkiye, İtalya...)" autocomplete="off">
                <ul class="suggestions-list" id="suggestions"></ul>
            </div>
            <button onclick="submitGuess()">Tahmin Et</button>
        </div>

        <div class="table-wrapper">
            <div class="grid-container">
                <div class="header-cell">Ülke</div>
                <div class="header-cell">Kıta</div>
                <div class="header-cell">Nüfus</div>
                <div class="header-cell">Yüzölçümü</div>
                <div class="header-cell">Deniz Kıyısı</div>
                <div class="header-cell">Komşuluk</div>
            </div>
            <div id="historyRows" class="grid-container" style="margin-top: 8px;"></div>
        </div>
    </div>

    <script>
        let countryDB = [];
        let targetCountry = null;
        let codeToNameDictionary = {}; // 3 harfli kodları (TUR) Türkçe isme (Türkiye) çevirecek sözlük

        const continentTranslations = {
            "Europe": "Avrupa", "Asia": "Asya", "Africa": "Afrika",
            "North America": "Kuzey Amerika", "South America": "Güney Amerika",
            "Oceania": "Okyanusya", "Antarctica": "Antarktika"
        };

        async function fetchCountries() {
            try {
                // cca3 (3 harfli kod) ve borders (sınır komşularının kodları) verilerini de çekiyoruz
                const response = await fetch("https://restcountries.com/v3.1/all?fields=name,continents,population,area,landlocked,translations,cca3,borders,unMember");
                const data = await response.json();

                // 1. Aşama: Kod Sözlüğünü Oluştur ve Ülkeleri Filtrele (Sadece Resmi BM Üyeleri ve Önemli Ülkeler)
                const filteredData = data.filter(item => item.unMember || item.translations?.tur?.common === "Filistin" || item.translations?.tur?.common === "Vatikan");

                filteredData.forEach(item => {
                    let turkceAd = item.translations?.tur?.common || item.name.common;
                    codeToNameDictionary[item.cca3] = turkceAd; // Örn: codeToNameDictionary["TUR"] = "Türkiye"
                });

                // 2. Aşama: Ülke Veritabanını İnşa Et
                countryDB = filteredData.map(item => {
                    let turkceAd = item.translations?.tur?.common || item.name.common;
                    
                    let kıta = item.continents[0];
                    if (turkceAd === "Türkiye" || turkceAd === "Rusya") {
                        kıta = "Europe"; // İsteğin üzerine Avrupa olarak sabitledik
                    }

                    return {
                        ad: turkceAd,
                        kita: continentTranslations[kıta] || kıta,
                        nufus: Math.round((item.population / 1000000) * 10) / 10,
                        alan: item.area,
                        kiyi: item.landlocked ? "Yok" : "Var",
                        komsuKodlari: item.borders || [] // ["GRC", "BGR", "SYR"...] şeklinde kodlar gelir
                    };
                });

                // Alfabetik sıralama
                countryDB.sort((a, b) => a.ad.localeCompare(b.ad));

                // Rastgele hedef ülke seçimi
                targetCountry = countryDB[Math.floor(Math.random() * countryDB.length)];
                console.log("Gizli Ülke (Hile):", targetCountry.ad);

                document.getElementById("loading").style.display = "none";
                document.getElementById("inputSection").style.display = "flex";

            } catch (error) {
                document.getElementById("loading").textContent = "❌ Veriler yüklenirken hata oluştu. Sayfayı yenileyin.";
                console.error(error);
            }
        }

        fetchCountries();

        // Arama Motoru (Autocomplete) Yönetimi
        const input = document.getElementById("countryInput");
        const suggestionsList = document.getElementById("suggestions");

        input.addEventListener("input", function() {
            const value = this.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!value) {
                suggestionsList.style.display = "none";
                return;
            }

            const filtered = countryDB.filter(c => c.ad.toLowerCase().includes(value));

            if (filtered.length > 0) {
                filtered.slice(0, 10).forEach(country => {
                    const li = document.createElement("li");
                    li.textContent = country.ad;
                    li.addEventListener("click", function() {
                        input.value = country.ad;
                        suggestionsList.style.display = "none";
                    });
                    suggestionsList.appendChild(li);
                });
                suggestionsList.style.display = "block";
            } else {
                suggestionsList.style.display = "none";
            }
        });

        document.addEventListener("click", function(e) {
            if (e.target !== input && e.target !== suggestionsList) {
                suggestionsList.style.display = "none";
            }
        });

        function submitGuess() {
            const guessName = input.value.trim();
            const guess = countryDB.find(c => c.ad.toLowerCase() === guessName.toLowerCase());

            if (!guess) {
                alert("Lütfen listeden geçerli bir ülke seçin!");
                return;
            }

            const history = document.getElementById("historyRows");

            // 1. Ülke Hücresi
            history.appendChild(createCell(guess.ad, guess.ad === targetCountry.ad));

            // 2. Kıta Hücresi
            history.appendChild(createCell(guess.kita, guess.kita === targetCountry.kita));

            // 3. Nüfus Hücresi
            let popArrow = guess.nufus < targetCountry.nufus ? " ⬆️" : (guess.nufus > targetCountry.nufus ? " ⬇️" : "");
            history.appendChild(createCell(`${guess.nufus} Milyon`, guess.nufus === targetCountry.nufus, popArrow));

            // 4. Yüzölçümü Hücresi
            let areaArrow = guess.alan < targetCountry.alan ? " ⬆️" : (guess.alan > targetCountry.alan ? " ⬇️" : "");
            history.appendChild(createCell(`${guess.alan.toLocaleString()} ㎢`, guess.alan === targetCountry.alan, areaArrow));

            // 5. Deniz Kıyısı Hücresi
            history.appendChild(createCell(`Kıyı: ${guess.kiyi}`, guess.kiyi === targetCountry.kiyi));

            // 6. Dinamik Komşuluk Hücresi Kontrolü
            if (guess.ad === targetCountry.ad) {
                history.appendChild(createCell("Hedef Ülke", true));
            } else {
                // Tahmin edilen ülkenin komşu kodlarının Türkçe isimlerini çıkarıyoruz
                let turkceKomsuIsimleri = guess.komsuKodlari.map(kod => codeToNameDictionary[kod]);
                
                // Gizli ülke bu komşuların arasında var mı?
                const komsuMu = turkceKomsuIsimleri.includes(targetCountry.ad);
                
                if (komsuMu) {
                    history.appendChild(createCell("Komşu 👍", true));
                } else {
                    history.appendChild(createCell("Komşu Değil ❌", false));
                }
            }

            input.value = "";
            suggestionsList.style.display = "none";

            if (guess.ad === targetCountry.ad) {
                document.getElementById("winScreen").style.display = "block";
                document.getElementById("inputSection").style.display = "none";
            }
        }

        function createCell(text, isMatch, subText = "") {
            const cell = document.createElement("div");
            cell.className = `cell ${isMatch ? 'match' : 'mismatch'}`;
            cell.textContent = text;
            if (subText) {
                const sub = document.createElement("span");
                sub.textContent = subText;
                cell.appendChild(sub);
            }
            return cell;
        }
    </script>
</body>
</html>
