<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Geotrivia</title>
    <style>
        body { font-family: sans-serif; background-color: #fcfaf5; margin: 0; }
        .navbar { display: flex; align-items: center; padding: 20px 50px; border-bottom: 1px solid #ddd; }
        .logo { font-size: 24px; font-weight: bold; margin-right: 50px; }
        .nav-links { display: flex; gap: 20px; color: #333; font-weight: 500; }

        .games-grid { display: grid; grid-template-columns: repeat(3, 300px); gap: 20px; }
        .game-card { border: 2px solid #000; border-radius: 15px; padding: 40px; text-align: center; background: #8cd867; text-decoration: none; color: #000; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🌍 Geotrivia</div>
        <div class="nav-links"><span>Geodle</span> <span>Coğrafi Bağlantılar</span></div>
    </div>
    <div class="container">
        <div class="section-title">Daily Games</div>
        <div class="games-grid">
            <a href="geodle.html" class="game-card">🟩<br>Geodle</a>
        </div>
    </div>
</body>
</html>
