<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geotrivia - Coğrafya Oyun Platformu</title>
    <style>
        :root {
            --bg-color: #f6f3ea;
            --text-color: #1e293b;
            --card-border: #000000;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Üst Menü / Navbar */
        .navbar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .nav-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-btn {
            background: white;
            border: 2px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--card-border);
        }

        /* Ana İçerik Alanı */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* Oyun Kartları Grid Sistemi (Görseldeki Gibi) */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .game-card {
            border: 3px solid var(--card-border);
            border-radius: 18px;
            padding: 30px 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            box-shadow: 5px 5px 0px var(--card-border);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            min-height: 160px;
        }

        .game-card:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--card-border);
        }

        .game-card img {
            font-size: 40px;
        }

        /* Kart Renkleri */
        .card-orange { background-color: #ffb86c; }
        .card-pink { background-color: #ff79c6; }
        .card-yellow { background-color: #f1fa8c; }
        .card-green { background-color: #50fa7b; }
        .card-purple { background-color: #bd93f9; }
        .card-blue { background-color: #8be9fd; }

        .badge-new {
            position: absolute;
            top: 12px;
            right: 12px;
            background: black;
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        /* GEODLE OYUN BÖLÜMÜ (Gizli Başlar, Karta Basınca Açılır) */
        .game-section {
            display: none;
            width: 100%;
            background-color: #1e293b;
            color: #f8fafc;
            padding: 30px;
            border-radius: 16px;
            box-sizing: border-box;
            margin-top: 20px;
            border: 3px solid #000;
            box-shadow: 6px 6px 0px #000;
        }

        /* Geodle Tablo ve Arama Arayüzü */
        .controls { display: flex; gap: 12px; margin-bottom: 25px; position: relative; }
        .search-container { position: relative; flex: 1; }
        #countryInput { width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        .suggestions-list { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border: 1px solid #334155; max-height: 200px; overflow-y: auto; z-index: 10; padding: 0; margin: 0; list-style: none; }
        .suggestions-list li { padding: 12px; cursor: pointer; }
        .suggestions-list li:hover { background: #334155; }
        
        .btn-guess { padding: 14px 28px; background: #2563eb; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .table-wrapper { overflow-x: auto; }
        .grid-container { display: grid; grid-template-columns: repeat(6, minmax(110px, 1fr)); gap: 8px; text-align: center; min-width: 650px; }
        .header-cell { color: #94a3b8; font-size: 13px; font-weight: bold; padding-bottom: 8px; border-bottom: 2px solid #334155; }
        
        .cell { padding: 15px 5px; font-size: 14px; font-weight: bold; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60px; background: #334155; }
        .arrow-box { font-size: 24px; font-weight: bold; }
        .match { background-color: var(--correct); }
        .mismatch { background-color: var(--wrong); }

        .win-screen { display: none; background: rgba(16, 185, 129, 0.2); border: 2px solid var(--correct); padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Üst Bar -->
    <div class="navbar">
        <div class="logo" onclick="location.reload()">🌍 Geotrivia</div>
        <div class="nav-profile">
            <span id="userGreeting">Misafir Oyuncu</span>
            <button class="profile-btn" onclick="manageProfile()" id="profileBtn">Profil Oluştur</button>
        </div>
    </div>

    <div class="container">
        <h2>Günlük Oyunlar</h2>
        
        <!-- Oyun Seçim Izgarası (Görseldeki Tasarım) -->
        <div class="game-grid">
            <div class="game-card card-orange">
                <div>📋</div>
                <div>GeoRankle</div>
            </div>
            <div class="game-card card-pink">
                <div>🔼🔽</div>
                <div>GeoDecide</div>
            </div>
            <div class="game-card card-yellow">
                <span class="badge-new">Yeni</span>
                <div>🎨</div>
                <div>GeoPaint</div>
            </div>
            <div class="game-card card-green" onclick="openGeodle()">
                <div>🟩❌</div>
                <div>Geodle</div>
            </div>
            <div class="game-card card-purple">
                <div>🔗</div>
                <div>Coğrafi Bağlantılar</div>
            </div>
            <div class="game-card card-blue">
                <div>💡</div>
                <div>Mod Öner</div>
            </div>
        </div>

        <!-- GEODLE OYUN ALANI -->
        <div class="game-section" id="geodleZone">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; color:#38bdf8;">GEODLE OYUNU</h2>
                <button onclick="closeGeodle()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕ Closes</button>
            </div>
            
            <div class="win-screen" id="winScreen">
                <h3 style="color:var(--correct); margin:0 0 10px 0;">🎉 Tebrikler! Hedef Ülkeyi Buldunuz!</h3>
                <button onclick="startNewGame()" style="padding:10px 20px; background:var(--correct); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Yeniden Oyna</button>
            </div>

            <div class="controls" id="inputSection">
                <div class="search-container">
                    <input type="text" id="countryInput" placeholder="Ülke adı yazın..." autocomplete="off">
                    <ul class="suggestions-list" id="suggestions"></ul>
                </div>
                <button class="btn-guess" onclick="submitGuess()">Tahmin Et</button>
            </div>

            <div class="table-wrapper">
                <div class="grid-container">
                    <div class="header-cell">Ülke</div>
                    <div class="header-cell">Kıta</div>
                    <div class="header-cell">Nüfus</div>
                    <div class="header-cell">Yüzölçümü</div>
                    <div class="header-cell">Deniz Kıyısı</div>
                    <div class="header-cell">Komşuluk</div>
                </div>
                <div id="historyRows" class="grid-container" style="margin-top: 8px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Ülke Veritabanı
        const countryDB = [
            { ad: "Türkiye", kita: "Avrupa", nufus: 85.3, alan: 783562, kiyi: "Var", komsular: ["Yunanistan", "Bulgaristan", "Suriye", "Irak", "İran", "Ermenistan", "Gürcistan", "Azerbaycan"] },
            { ad: "Almanya", kita: "Avrupa", nufus: 84.4, alan: 357022, kiyi: "Var", komsular: ["Fransa", "İsviçre", "Avusturya", "Polonya", "Çekya", "Danimarka", "Belçika", "Hollanda", "Lüksemburg"] },
            { ad: "Fransa", kita: "Avrupa", nufus: 68.1, alan: 543965, kiyi: "Var", komsular: ["Almanya", "Belçika", "Lüksemburg", "İsviçre", "İtalya", "İspanya", "Andorra", "Monako"] },
            { ad: "İtalya", kita: "Avrupa", nufus: 58.9, alan: 301340, kiyi: "Var", komsular: ["Fransa", "İsviçre", "Avusturya", "Slovenya", "San Marino", "Vatikan"] },
            { ad: "Japonya", kita: "Asya", nufus: 123.2, alan: 377975, kiyi: "Var", komsular: [] },
            { ad: "Yunanistan", kita: "Avrupa", nufus: 10.4, alan: 131957, kiyi: "Var", komsular: ["Türkiye", "Bulgaristan", "Kuzey Makedonya", "Arnavutluk"] },
            { ad: "Mısır", kita: "Afrika", nufus: 112.7, alan: 1002450, kiyi: "Var", komsular: ["İsrail", "Libya", "Sudan", "Filistin"] },
            { ad: "Amerika Birleşik Devletleri", kita: "Kuzey Amerika", nufus: 339.9, alan: 9833517, kiyi: "Var", komsular: ["Kanada", "Meksika"] },
            { ad: "Brezilya", kita: "Güney Amerika", nufus: 216.4, alan: 8515767, kiyi: "Var", komsular: ["Arjantin", "Bolivya", "Kolombiya", "Gayana", "Paraguay", "Peru", "Surinam", "Uruguay", "Venezuela"] },
            { ad: "Rusya", kita: "Avrupa", nufus: 144.4, alan: 17098242, kiyi: "Var", komsular: ["Norveç", "Finlandiya", "Estonya", "Letonya", "Litvanya", "Polonya", "Belarus", "Ukrayna", "Gürcistan", "Azerbaycan", "Kazakistan", "Çin", "Moğolistan", "Kuzey Kore"] }
        ];

        let targetCountry = null;

        // Profil Yönetimi (Local Registration)
        function checkProfile() {
            let username = localStorage.getItem("gt_username");
            if (username) {
                document.getElementById("userGreeting").innerHTML = `👤 <strong>${username}</strong>`;
                document.getElementById("profileBtn").textContent = "Profili Sil";
            } else {
                document.getElementById("userGreeting").textContent = "Misafir Oyuncu";
                document.getElementById("profileBtn").textContent = "Profil Oluştur";
            }
        }

        function manageProfile() {
            let current = localStorage.getItem("gt_username");
            if (current) {
                if(confirm("Profilinizi silmek istediğinize emin misiniz? Skorlarınız kaybolacaktır.")) {
                    localStorage.removeItem("gt_username");
                    checkProfile();
                }
            } else {
                let name = prompt("Lütfen bir kullanıcı adı belirleyin (Kayıt Ol):");
                if (name && name.trim() !== "") {
                    localStorage.setItem("gt_username", name.trim());
                    checkProfile();
                }
            }
        }

        window.onload = checkProfile;

        // Arayüz Tetikleyicileri
        function openGeodle() {
            document.getElementById("geodleZone").style.display = "block";
            document.getElementById("geodleZone").scrollIntoView({ behavior: 'smooth' });
            startNewGame();
        }

        function closeGeodle() {
            document.getElementById("geodleZone").style.display = "none";
        }

        function startNewGame() {
            targetCountry = countryDB[Math.floor(Math.random() * countryDB.length)];
            document.getElementById("historyRows").innerHTML = "";
            document.getElementById("winScreen").style.display = "none";
            document.getElementById("inputSection").style.display = "flex";
            document.getElementById("countryInput").value = "";
        }

        // Geodle Temel Tahmin Mantığı
        const input = document.getElementById("countryInput");
        const suggestionsList = document.getElementById("suggestions");

        input.addEventListener("input", function() {
            const value = this.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";
            if (!value) { suggestionsList.style.display = "none"; return; }
            const filtered = countryDB.filter(c => c.ad.toLowerCase().includes(value));
            filtered.forEach(country => {
                const li = document.createElement("li");
                li.textContent = country.ad;
                li.addEventListener("click", function() { input.value = country.ad; suggestionsList.style.display = "none"; });
                suggestionsList.appendChild(li);
            });
            suggestionsList.style.display = "block";
        });

        function submitGuess() {
            const guessName = input.value.trim();
            const guess = countryDB.find(c => c.ad.toLowerCase() === guessName.toLowerCase());
            if (!guess) { alert("Lütfen listeden geçerli bir ülke seçin!"); return; }

            const history = document.getElementById("historyRows");
            history.appendChild(createCell(guess.ad, guess.ad === targetCountry.ad));
            history.appendChild(createCell(guess.kita, guess.kita === targetCountry.kita));

            let popArrow = guess.nufus < targetCountry.nufus ? "⬆️" : (guess.nufus > targetCountry.nufus ? "⬇️" : "");
            history.appendChild(createCell(`${guess.nufus} Milyon`, guess.nufus === targetCountry.nufus, popArrow));

            let areaArrow = guess.alan < targetCountry.alan ? "⬆️" : (guess.alan > targetCountry.alan ? "⬇️" : "");
            history.appendChild(createCell(`${guess.alan.toLocaleString()} km²`, guess.alan === targetCountry.alan, areaArrow));

            history.appendChild(createCell(`Kıyı: ${guess.kiyi}`, guess.kiyi === targetCountry.kiyi));

            if (guess.ad === targetCountry.ad) {
                history.appendChild(createCell("Hedef Ülke", true));
                document.getElementById("winScreen").style.display = "block";
                document.getElementById("inputSection").style.display = "none";
            } else {
                const komsuMu = guess.komsular.includes(targetCountry.ad) || targetCountry.komsular.includes(guess.ad);
                history.appendChild(createCell(komsuMu ? "Komşu 👍" : "Komşu Değil ❌", komsuMu));
            }
            input.value = "";
            suggestionsList.style.display = "none";
        }

        function createCell(text, isMatch, subText = "") {
            const cell = document.createElement("div");
            cell.className = `cell ${isMatch ? 'match' : 'mismatch'}`;
            cell.textContent = text;
            if (subText) {
                const sub = document.createElement("div");
                sub.className = "arrow-box";
                sub.textContent = subText;
                cell.appendChild(sub);
            }
            return cell;
        }
    </script>
</body>
</html>
