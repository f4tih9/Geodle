<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geodle - Sınırsız Dünya Ülkeleri</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --correct: #10b981;
            --wrong: #ef4444;
            --border: #334155;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #94a3b8;
        }

        .stats-bar span strong {
            color: #38bdf8;
        }

        .game-box {
            width: 100%;
            max-width: 900px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text);
            outline: none;
            box-sizing: border-box;
        }

        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            margin: 0;
            padding: 0;
            list-style: none;
            display: none;
        }

        .suggestions-list li {
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestions-list li:hover {
            background-color: #334155;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            background: linear-gradient(to right, #2563eb, #3b82f6);
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: linear-gradient(to right, #1d4ed8, #2563eb);
        }

        .table-wrapper { overflow-x: auto; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, minmax(110px, 1fr));
            gap: 8px;
            text-align: center;
            min-width: 680px;
        }

        .header-cell {
            font-weight: 600;
            font-size: 13px;
            color: #94a3b8;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .cell {
            padding: 15px 5px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            animation: reveal 0.5s ease forwards;
        }

        .cell span {
            font-size: 11px;
            font-weight: normal;
            opacity: 0.85;
            margin-top: 4px;
        }

        .match { background-color: var(--correct); }
        .mismatch { background-color: var(--wrong); }

        .win-screen {
            display: none;
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid var(--correct);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .win-screen h2 { margin: 0 0 10px 0; color: var(--correct); }

        @keyframes reveal {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

        // Autocomplete Arama Motoru Mekanizması
        const input = document.getElementById("countryInput");
        const suggestionsList = document.getElementById("suggestions");

        input.addEventListener("input", function() {
            const value = this.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!value) {
                suggestionsList.style.display = "none";
                return;
            }

            const filtered = countryDB.filter(c => c.ad.toLowerCase().includes(value));

            if (filtered.length > 0) {
                filtered.forEach(country => {
                    const li = document.createElement("li");
                    li.textContent = country.ad;
                    li.addEventListener("click", function() {
                        input.value = country.ad;
                        suggestionsList.style.display = "none";
                    });
                    suggestionsList.appendChild(li);
                });
                suggestionsList.style.display = "block";
            } else {
                suggestionsList.style.display = "none";
            }
        });

        document.addEventListener("click", function(e) {
            if (e.target !== input && e.target !== suggestionsList) {
                suggestionsList.style.display = "none";
            }
        });

        function submitGuess() {
            const guessName = input.value.trim();
            const guess = countryDB.find(c => c.ad.toLowerCase() === guessName.toLowerCase());

            if (!guess) {
                alert("Lütfen listeden geçerli bir ülke seçin!");
                return;
            }

            const history = document.getElementById("historyRows");

            // 1. Ülke Hücresi
            history.appendChild(createCell(guess.ad, guess.ad === targetCountry.ad));

            // 2. Kıta Hücresi
            history.appendChild(createCell(guess.kita, guess.kita === targetCountry.kita));

            // 3. Nüfus Hücresi
            let popArrow = guess.nufus < targetCountry.nufus ? " ⬆️" : (guess.nufus > targetCountry.nufus ? " ⬇️" : "");
            history.appendChild(createCell(`${guess.nufus} Milyon`, guess.nufus === targetCountry.nufus, popArrow));

            // 4. Yüzölçümü Hücresi
            let areaArrow = guess.alan < targetCountry.alan ? " ⬆️" : (guess.alan > targetCountry.alan ? " ⬇️" : "");
            history.appendChild(createCell(`${guess.alan.toLocaleString()} ㎢`, guess.alan === targetCountry.alan, areaArrow));

            // 5. Deniz Kıyısı Hücresi
            history.appendChild(createCell(`Kıyı: ${guess.kiyi}`, guess.kiyi === targetCountry.kiyi));

            // 6. Komşuluk Hücresi
            if (guess.ad === targetCountry.ad) {
                history.appendChild(createCell("Hedef Ülke", true));
            } else {
                // Karşılıklı komşuluk kontrolü (A ülkesi B'nin komşularında var mı veya tam tersi)
                const komsuMu = guess.komsular.includes(targetCountry.ad) || targetCountry.komsular.includes(guess.ad);
                if (komsuMu) {
                    history.appendChild(createCell("Komşu 👍", true));
                } else {
                    history.appendChild(createCell("Komşu Değil ❌", false));
                }
            }

            input.value = "";
            suggestionsList.style.display = "none";

            // Kazanma Durumu Tetikleme
            if (guess.ad === targetCountry.ad) {
                wins++;
                streak++;
                localStorage.setItem("geodle_wins", wins);
                localStorage.setItem("geodle_streak", streak);
                
                document.getElementById("statWins").textContent = wins;
                document.getElementById("statStreak").textContent = streak;

                document.getElementById("winScreen").style.display = "block";
                document.getElementById("inputSection").style.display = "none";
            }
        }

        function createCell(text, isMatch, subText = "") {
            const cell = document.createElement("div");
            cell.className = `cell ${isMatch ? 'match' : 'mismatch'}`;
            cell.textContent = text;
            if (subText) {
                const sub = document.createElement("span");
                sub.textContent = subText;
                cell.appendChild(sub);
            }
            return cell;
        }
    </script>
</body>
</html>
