<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geodle - Dünya Ülkeleri Tahmin Oyunu</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --correct: #10b981;
            --wrong: #ef4444;
            --border: #334155;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-box {
            width: 100%;
            max-width: 900px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text);
            outline: none;
            box-sizing: border-box;
        }

        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            margin: 0;
            padding: 0;
            list-style: none;
            display: none;
        }

        .suggestions-list li {
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestions-list li:hover, .suggestions-list li.active {
            background-color: #334155;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            background: linear-gradient(to right, #2563eb, #3b82f6);
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.97); }

        .table-wrapper {
            overflow-x: auto;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, minmax(110px, 1fr));
            gap: 8px;
            text-align: center;
            min-width: 700px;
        }

        .header-cell {
            font-weight: 600;
            font-size: 13px;
            color: #94a3b8;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .cell {
            padding: 15px 5px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            animation: reveal 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .cell span {
            font-size: 11px;
            font-weight: normal;
            opacity: 0.85;
            margin-top: 4px;
        }

        .match { background-color: var(--correct); }
        .mismatch { background-color: var(--wrong); }

        @keyframes reveal {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .win-screen {
            display: none;
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid var(--correct);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>GEODLE</h1>
        <p style="color: #94a3b8; margin: 5px 0 0 0;">Dünyadaki tüm ülkeler arasından gizli olanı bul!</p>
    </header>

    <div class="game-box">
        <div class="win-screen" id="winScreen">🎉 Tebrikler! Gizli ülkeyi doğru tahmin ettiniz!</div>

        <div class="controls" id="inputSection">
            <div class="search-container">
                <input type="text" id="countryInput" placeholder="Ülke adı yazın..." autocomplete="off">
                <ul class="suggestions-list" id="suggestions"></ul>
            </div>
            <button onclick="submitGuess()">Tahmin Et</button>
        </div>

        <div class="table-wrapper">
            <div class="grid-container">
                <div class="header-cell">Ülke</div>
                <div class="header-cell">Kıta</div>
                <div class="header-cell">Nüfus</div>
                <div class="header-cell">Yüzölçümü</div>
                <div class="header-cell">Deniz Kıyısı</div>
                <div class="header-cell">Komşuluk</div>
            </div>
            <div id="historyRows" class="grid-container" style="margin-top: 8px;"></div>

    </div>

            { ad: "Azerbaycan", kita: "Asya", nufus: 10.2, alan: 86600, kiyi: "Yok", komsular: ["Ermenistan", "Gürcistan", "İran", "Rusya", "Türkiye"] },
            { ad: "Bulgaristan", kita: "Avrupa", nufus: 6.4, alan: 110879, kiyi: "Var", komsular: ["Türkiye", "Yunanistan", "Romanya", "Sırbistan", "Kuzey Makedonya"] },
            { ad: "Hollanda", kita: "Avrupa", nufus: 17.8, alan: 41543, kiyi: "Var", komsular: ["Almanya", "Belçika"] },

            { ad: "Avusturya", kita: "Avrupa", nufus: 9.1, alan: 83871, kiyi: "Yok", komsular: ["Almanya", "Çekya", "Slovakya", "Macaristan", "Slovenya", "İtalya", "İsviçre", "Lihtenştayn"] },
            { ad: "Polonya", kita: "Avrupa", nufus: 36.7, alan: 312696, kiyi: "Var", komsular: ["Almanya", "Çekya", "Slovakya", "Ukrayna", "Belarus", "Litvanya", "Rusya"] },
            { ad: "Portekiz", kita: "Avrupa", nufus: 10.4, alan: 92212, kiyi: "Var", komsular: ["İspanya"] },
            { ad: "İsveç", kita: "Avrupa", nufus: 10.5, alan: 450295, kiyi: "Var", komsular: ["Norveç", "Finlandiya"] },
            { ad: "Norveç", kita: "Avrupa", nufus: 5.5, alan: 323802, kiyi: "Var", komsular: ["İsveç", "Finlandiya", "Rusya"] },
            { ad: "Finlandiya", kita: "Avrupa", nufus: 5.6, alan: 338424, kiyi: "Var", komsular: ["İsveç", "Norveç", "Rusya"] },
            { ad: "Cezayir", kita: "Afrika", nufus: 45.6, alan: 2381741, kiyi: "Var", komsular: ["Tunus", "Libya", "Nijer", "Mali", "Moritanya", "Batı Sahra", "Fas"] },
            { ad: "Fas", kita: "Afrika", nufus: 37.8, alan: 446550, kiyi: "Var", komsular: ["Cezayir", "İspanya", "Batı Sahra"] },
            { ad: "Tunus", kita: "Afrika", nufus: 12.4, alan: 163610, kiyi: "Var", komsular: ["Cezayir", "Libya"] },
            { ad: "Libya", kita: "Afrika", nufus: 6.8, alan: 1759540, kiyi: "Var", komsular: ["Mısır", "Sudan", "Çad", "Nijer", "Cezayir", "Tunus"] },
            { ad: "Pakistan", kita: "Asya", nufus: 240.5, alan: 881913, kiyi: "Var", komsular: ["İran", "Afganistan", "Çin", "Hindistan"] },
            { ad: "Afganistan", kita: "Asya", nufus: 42.2, alan: 652864, kiyi: "Yok", komsular: ["İran", "Pakistan", "Çin", "Tacikistan", "Türkmenistan", "Özbekistan"] },
            { ad: "Endonezya", kita: "Asya", nufus: 277.5, alan: 1904569, kiyi: "Var", komsular: ["Malezya", "Papua Yeni Gine", "Doğu Timor"] },
            { ad: "Malezya", kita: "Asya", nufus: 34.3, alan: 330803, kiyi: "Var", komsular: ["Tayland", "Endonezya", "Brunei"] },
            { ad: "Tayland", kita: "Asya", nufus: 71.8, alan: 513120, kiyi: "Var", komsular: ["Kamboçya", "Laos", "Myanmar", "Malezya"] },
            { ad: "Kolombiya", kita: "Güney Amerika", nufus: 52.0, alan: 1141748, kiyi: "Var", komsular: ["Brezilya", "Ekvador", "Panama", "Peru", "Venezuela"] },
            { ad: "Peru", kita: "Güney Amerika", nufus: 34.3, alan: 1285216, kiyi: "Var", komsular: ["Bolivya", "Brezilya", "Şili", "Kolombiya", "Ekvador"] },
            { ad: "Şili", kita: "Güney Amerika", nufus: 19.6, alan: 756102, kiyi: "Var", komsular: ["Arjantin", "Bolivya", "Peru"] },
            { ad: "Yeni Zelanda", kita: "Okyanusya", nufus: 5.2, alan: 268021, kiyi: "Var", komsular: [] }
        ];

        // Rastgele hedef ülke seçimi
        const targetCountry = countryDB[Math.floor(Math.random() * countryDB.length)];

        // Arama ve Autocomplete DOM elementleri
        const input = document.getElementById("countryInput");
        const suggestionsList = document.getElementById("suggestions");
        let activeIndex = -1;

        // Girdi alanına harf yazıldığında tetiklenen fonksiyon
        input.addEventListener("input", function() {
            const value = this.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";
            activeIndex = -1;

            if (!value) {
                suggestionsList.style.display = "none";
                return;
            }

            const filtered = countryDB.filter(c => c.ad.toLowerCase().includes(value));

            if (filtered.length > 0) {
                filtered.forEach(country => {
                    const li = document.createElement("li");
                    li.textContent = country.ad;
                    li.addEventListener("click", function() {
                        input.value = country.ad;
                        suggestionsList.style.display = "none";
                    });
                    suggestionsList.appendChild(li);
                });
                suggestionsList.style.display = "block";
            } else {
                suggestionsList.style.display = "none";
            }
        });

        // Klavye ile listede gezinme desteği
        input.addEventListener("keydown", function(e) {
            const items = suggestionsList.getElementsByTagName("li");
            if (e.key === "ArrowDown") {
                activeIndex = (activeIndex + 1) % items.length;
                setActive(items);
            } else if (e.key === "ArrowUp") {
                activeIndex = (activeIndex - 1 + items.length) % items.length;
                setActive(items);
            } else if (e.key === "Enter") {
                if (activeIndex > -1 && items[activeIndex]) {
                    input.value = items[activeIndex].textContent;
                    suggestionsList.style.display = "none";
                    e.preventDefault();
                }
            }
        });

        function setActive(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove("active");
            }
            if (activeIndex > -1 && items[activeIndex]) {
                items[activeIndex].classList.add("active");
                items[activeIndex].scrollIntoView({ block: "nearest" });
            }
        }

        // Tıklama dışarıya yapıldığında listeyi kapatma
        document.addEventListener("click", function(e) {
            if (e.target !== input && e.target !== suggestionsList) {
                suggestionsList.style.display = "none";
            }
        });

        function submitGuess() {
            const guessName = input.value.trim();
            const guess = countryDB.find(c => c.ad.toLowerCase() === guessName.toLowerCase());

            if (!guess) {
                alert("Lütfen listede olan geçerli bir ülke adı yazın!");
                return;
            }

            const history = document.getElementById("historyRows");

            // 1. Ülke Hücresi
            history.appendChild(createCell(guess.ad, guess.ad === targetCountry.ad));

            // 2. Kıta Hücresi
            history.appendChild(createCell(guess.kita, guess.kita === targetCountry.kita));

            // 3. Nüfus Hücresi (Değer + Yön Oku)
            let popArrow = guess.nufus < targetCountry.nufus ? " ⬆️" : (guess.nufus > targetCountry.nufus ? " ⬇️" : "");
            history.appendChild(createCell(`${guess.nufus} Milyon`, guess.nufus === targetCountry.nufus, popArrow));

            // 4. Yüzölçümü Hücresi (Değer + Yön Oku)
            let areaArrow = guess.alan < targetCountry.alan ? " ⬆️" : (guess.alan > targetCountry.alan ? " ⬇️" : "");
            history.appendChild(createCell(`${guess.alan.toLocaleString()} ㎢`, guess.alan === targetCountry.alan, areaArrow));

            // 5. Deniz Kıyısı Hücresi
            const kiyiEslesmesi = guess.kiyi === targetCountry.kiyi;
            history.appendChild(createCell(`Kıyı: ${guess.kiyi}`, kiyiEslesmesi));

            // 6. Komşuluk Hücresi
            if (guess.ad === targetCountry.ad) {
                history.appendChild(createCell("Hedef Ülke", true));
            } else {
                const komsuMu = guess.komsular.includes(targetCountry.ad);
                if (komsuMu) {
                    history.appendChild(createCell("Komşu 👍", true));
                } else {
                    history.appendChild(createCell("Komşu Değil ❌", false));
                }
            }

            // Arama kutusunu temizle
            input.value = "";
            suggestionsList.style.display = "none";

            // Kazanma Ekranı tetikleme
            if (guess.ad === targetCountry.ad) {
                document.getElementById("winScreen").style.display = "block";
                document.getElementById("inputSection").style.display = "none";
            }
        }

        function createCell(text, isMatch, subText = "") {
            const cell = document.createElement("div");
            cell.className = `cell ${isMatch ? 'match' : 'mismatch'}`;
            cell.textContent = text;
            if (subText) {
                const sub = document.createElement("span");
                sub.textContent = subText;
                cell.appendChild(sub);
            }
            return cell;
        }
    </script>
</body>
</html>
