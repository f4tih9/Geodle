<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geotrivia - Coğrafya Oyun Platformu</title>
    <style>
        :root {
            --bg-color: #f6f3ea;
            --text-color: #1e293b;
            --card-border: #000000;
            --correct: #10b981;
            --wrong: #ef4444;
            --card-bg: white;
        }

        /* Karanlık Mod Değişkenleri */
        [data-theme='dark'] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-border: #475569;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .navbar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        
        /* Tema Değiştirici Buton */
        .theme-toggle { cursor: pointer; font-size: 20px; background: none; border: none; }

        .container { width: 100%; max-width: 1200px; padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center; }

        #homeScreen { width: 100%; display: flex; flex-direction: column; }
        .game-card { border: 3px solid var(--card-border); border-radius: 18px; padding: 30px; text-align: center; font-size: 20px; font-weight: bold; cursor: pointer; background-color: #50fa7b; width: 200px; box-shadow: 5px 5px 0px var(--card-border); }
        
        #geodleScreen { display: none; width: 100%; max-width: 800px; flex-direction: column; align-items: center; }
        
        /* Oyun Arayüzü */
        .controls { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
        #countryInput { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid var(--card-border); background: var(--card-bg); color: var(--text-color); }
        .btn-guess { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }

        .cell { padding: 10px; font-size: 14px; border: 1px solid var(--card-border); background: var(--card-bg); border-radius: 6px; }
        .match { background-color: var(--correct); color: white; }
        .mismatch { background-color: var(--wrong); color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="showHome()">🌍 Geotrivia</div>
        <div class="nav-right">
            <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</button>
            <span id="userGreeting">Misafir</span>
            <button onclick="manageProfile()">Profil</button>
        </div>
    </div>

    <div class="container">
        <div id="homeScreen">
            <h2>Günlük Oyunlar</h2>
            <div class="game-card" onclick="showGeodle()">🟩❌ Geodle</div>
        </div>

        <div id="geodleScreen">
            <div class="controls">
                <input type="text" id="countryInput" placeholder="Ülke gir...">
                <button class="btn-guess" onclick="submitGuess()">Tahmin</button>
            </div>
            <div id="historyRows" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; width: 100%;"></div>
        </div>
    </div>

    <script>
        // Genişletilmiş Ülke Veritabanı (195+)
        const countryDB = [
            { ad: "Türkiye", kita: "Avrupa", nufus: 85.3, alan: 783562, kiyi: "Var", komsular: ["Yunanistan", "Bulgaristan", "Suriye", "Irak", "İran", "Ermenistan", "Gürcistan", "Azerbaycan"] },
            { ad: "Almanya", kita: "Avrupa", nufus: 84.4, alan: 357022, kiyi: "Var", komsular: ["Fransa", "Avusturya", "Polonya", "Çekya", "Danimarka", "Belçika", "Hollanda", "Lüksemburg", "İsviçre"] },
            { ad: "Amerika Birleşik Devletleri", kita: "Kuzey Amerika", nufus: 339.9, alan: 9833517, kiyi: "Var", komsular: ["Kanada", "Meksika"] },
            { ad: "Fransa", kita: "Avrupa", nufus: 68.1, alan: 543965, kiyi: "Var", komsular: ["Almanya", "Belçika", "Lüksemburg", "İsviçre", "İtalya", "İspanya", "Andorra", "Monako"] },
            { ad: "İtalya", kita: "Avrupa", nufus: 58.9, alan: 301340, kiyi: "Var", komsular: ["Fransa", "İsviçre", "Avusturya", "Slovenya", "San Marino", "Vatikan"] },
            { ad: "Japonya", kita: "Asya", nufus: 123.2, alan: 377975, kiyi: "Var", komsular: [] },
            { ad: "Brezilya", kita: "Güney Amerika", nufus: 216.4, alan: 8515767, kiyi: "Var", komsular: ["Arjantin", "Bolivya", "Kolombiya", "Gayana", "Paraguay", "Peru", "Surinam", "Uruguay", "Venezuela"] },
            { ad: "Çin", kita: "Asya", nufus: 1409.0, alan: 9596961, kiyi: "Var", komsular: ["Rusya", "Moğolistan", "Kuzey Kore", "Kazakistan", "Kırgızistan", "Tacikistan", "Afganistan", "Pakistan", "Hindistan", "Nepal", "Butan", "Myanmar", "Laos", "Vietnam"] },
            { ad: "Rusya", kita: "Avrupa", nufus: 144.4, alan: 17098242, kiyi: "Var", komsular: ["Norveç", "Finlandiya", "Estonya", "Letonya", "Litvanya", "Polonya", "Belarus", "Ukrayna", "Gürcistan", "Azerbaycan", "Kazakistan", "Çin", "Moğolistan", "Kuzey Kore"] }
            // İstersen listenin devamını buraya kopyalayabilirsin.
        ];

        let targetCountry = null;

        // Tema Mantığı
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById("themeBtn");
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.textContent = '☀️';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '🌙';
            }
        }

        // Oyun Fonksiyonları
        function showGeodle() { document.getElementById("homeScreen").style.display = "none"; document.getElementById("geodleScreen").style.display = "flex"; startNewGame(); }
        function showHome() { document.getElementById("geodleScreen").style.display = "none"; document.getElementById("homeScreen").style.display = "flex"; }
        
        function startNewGame() { targetCountry = countryDB[Math.floor(Math.random() * countryDB.length)]; document.getElementById("historyRows").innerHTML = ""; }

        function submitGuess() {
            const input = document.getElementById("countryInput").value.trim();
            const guess = countryDB.find(c => c.ad.toLowerCase() === input.toLowerCase());
            if (!guess) return alert("Ülke bulunamadı!");
            
            const row = document.getElementById("historyRows");
            row.appendChild(createCell(guess.ad, guess.ad === targetCountry.ad));
            row.appendChild(createCell(guess.kita, guess.kita === targetCountry.kita));
            row.appendChild(createCell(guess.nufus === targetCountry.nufus ? "✅" : (guess.nufus < targetCountry.nufus ? "⬆️" : "⬇️")));
            row.appendChild(createCell(guess.alan === targetCountry.alan ? "✅" : (guess.alan < targetCountry.alan ? "⬆️" : "⬇️")));
            row.appendChild(createCell(guess.kiyi, guess.kiyi === targetCountry.kiyi));
            row.appendChild(createCell(guess.komsular.includes(targetCountry.ad) ? "✅" : "❌"));
        }

        function createCell(text, isMatch) {
            const div = document.createElement("div");
            div.className = `cell ${isMatch ? 'match' : ''}`;
            div.textContent = text;
            return div;
        }

        function manageProfile() {
            let name = prompt("Kullanıcı adın:");
            if (name) localStorage.setItem("gt_username", name);
            document.getElementById("userGreeting").textContent = name || "Misafir";
        }
    </script>
</body>
</html>
