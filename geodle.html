<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Geodle - Oyna</title>
    <style>
        :root { --bg: #fcfaf5; --text: #000; --header: #64748b; --cell: #ffffff; }
        .dark-mode { --bg: #0f172a; --text: #f8fafc; --header: #334155; --cell: #1e293b; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        
        .controls { position: relative; width: 100%; max-width: 450px; margin-bottom: 40px; }
        #countryInput { width: 100%; padding: 15px; border: 2px solid #3b82f6; border-radius: 12px; font-size: 16px; outline: none; background: var(--cell); color: var(--text); }
        #suggestions { position: absolute; background: var(--cell); border: 1px solid #ccc; width: 100%; list-style: none; padding: 0; border-radius: 8px; z-index: 10; color: var(--text); }
        .sugg { padding: 12px; cursor: pointer; }
        .sugg:hover { background: #3b82f6; color: white; }

        .grid-layout { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; width: 100%; max-width: 900px; }
        .header-cell { background-color: var(--header); color: white; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; }
        .cell { padding: 15px; background: var(--cell); border: 1px solid #cbd5e1; text-align: center; font-weight: bold; border-radius: 8px; }
        .match { background-color: #10b981 !important; color: white !important; }
        
        #themeToggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; border: none; background: none; }
    </style>
</head>
<body class="dark-mode"> <!-- Site otomatik karanlık açılır -->

    <button id="themeToggle" onclick="document.body.classList.toggle('dark-mode')">🌗</button>

    <div class="controls">
        <input type="text" id="countryInput" placeholder="Ülke adı yaz..." autocomplete="off">
        <ul id="suggestions"></ul>
    </div>
    
    <div class="grid-layout" id="gameGrid">
        <div class="header-cell">Ülke</div>
        <div class="header-cell">Kıta</div>
        <div class="header-cell">Nüfus</div>
        <div class="header-cell">Alan</div>
        <div class="header-cell">Kıyı</div>
        <div class="header-cell">Komşu</div>
    </div>

    <script>
        const countryDB = [
            { ad: "Türkiye", kita: "Asya", nufus: "85 Mn", alan: "783 km²", kiyi: "Var" },
            { ad: "Bulgaristan", kita: "Avrupa", nufus: "6 Mn", alan: "110 km²", kiyi: "Var" }
        ];
        
        let target = countryDB[0];
        const input = document.getElementById('countryInput');
        const list = document.getElementById('suggestions');

        input.oninput = () => {
            list.innerHTML = '';
            const val = input.value.toLowerCase();
            if(!val) return;
            const found = countryDB.find(c => c.ad.toLowerCase().startsWith(val));
            if(found) {
                const li = document.createElement('li');
                li.className = 'sugg'; li.textContent = found.ad;
                li.onclick = () => { input.value = found.ad; list.innerHTML = ''; submitGuess(); }; // Tıklayınca otomatik seçer ve tahmin eder
                list.appendChild(li);
            }
        };

        function submitGuess() {
            const guess = countryDB.find(c => c.ad.toLowerCase() === input.value.toLowerCase());
            if (!guess) return;
            const grid = document.getElementById('gameGrid');
            [guess.ad, guess.kita, guess.nufus, guess.alan, guess.kiyi, "Uzak"].forEach((val, i) => {
                const div = document.createElement('div');
                div.className = 'cell ' + (i === 0 && val === target.ad ? 'match' : '');
                div.textContent = val;
                grid.appendChild(div);
            });
            input.value = '';
        }
        
        input.onkeydown = (e) => { if(e.key === 'Enter') submitGuess(); };
    </script>
</body>
</html>
