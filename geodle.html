<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Geodle - Oyna</title>
    <style>
        body { font-family: sans-serif; background-color: #8cd867; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .game-box { background: white; padding: 40px; border-radius: 20px; border: 3px solid #000; text-align: center; width: 400px; }
        #inputWrapper { position: relative; margin-top: 20px; }
        #countryInput { width: 100%; padding: 12px; border: 2px solid #000; border-radius: 8px; box-sizing: border-box; }
        #suggestions { position: absolute; background: white; border: 1px solid #000; width: 100%; list-style: none; padding: 0; margin: 0; }
        .sugg { padding: 10px; cursor: pointer; }
        .sugg:hover { background: #eee; }
        .grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 5px; margin-top: 20px; }
        .cell { border: 2px solid #000; padding: 10px; font-weight: bold; }
        .match { background: #10b981; color: white; }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>Geodle</h1>
        <div id="inputWrapper">
            <input type="text" id="countryInput" placeholder="Ülke gir..." autofocus>
            <ul id="suggestions"></ul>
        </div>
        <div id="res" class="grid"></div>
    </div>

    <script>
        // Veritabanı ve oyun mantığı aynı kalıyor...
        const db = [{ ad: "Türkiye", kita: "Asya", nufus: 85, alan: 783 }, { ad: "Bulgaristan", kita: "Avrupa", nufus: 6, alan: 110 }];
        let target = db[Math.floor(Math.random() * db.length)];
        const input = document.getElementById('countryInput');
        
        input.oninput = () => {
            const list = document.getElementById('suggestions');
            list.innerHTML = '';
            db.filter(c => c.ad.toLowerCase().startsWith(input.value.toLowerCase())).forEach(c => {
                const li = document.createElement('li');
                li.className = 'sugg'; li.textContent = c.ad;
                li.onclick = () => { input.value = c.ad; list.innerHTML = ''; };
                list.appendChild(li);
            });
        };

        input.onkeydown = (e) => { if(e.key === 'Enter') submit(); };

        function submit() {
            const guess = db.find(c => c.ad === input.value);
            if(!guess) return;
            const res = document.getElementById('res');
            [guess.ad, guess.kita, guess.nufus, guess.alan].forEach((v, i) => {
                const d = document.createElement('div');
                d.className = 'cell ' + (i === 0 && v === target.ad ? 'match' : '');
                d.textContent = v;
                res.appendChild(d);
            });
            input.value = '';
        }
    </script>
</body>
</html>
