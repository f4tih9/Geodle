<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Geodle - Oyna</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f6f3ea; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .controls { position: relative; width: 100%; max-width: 600px; margin-bottom: 30px; display: flex; gap: 10px; }
        #countryInput { flex: 1; padding: 15px; border: 2px solid #000; border-radius: 8px; font-size: 16px; }
        .btn-guess { padding: 10px 20px; background: #2563eb; color: #fff; border: 2px solid #000; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid-layout { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 100%; max-width: 800px; }
        .cell { padding: 15px; border: 2px solid #000; background: white; text-align: center; font-weight: bold; border-radius: 6px; }
        .match { background-color: #10b981 !important; color: white !important; }
        .mismatch { background-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="countryInput" placeholder="Ülke adı gir...">
        <button class="btn-guess" onclick="submitGuess()">Tahmin</button>
    </div>
    
    <div class="grid-layout" id="gameGrid">
        <!-- Başlıklar -->
        <div class="cell" style="background:#f0f0f0">Ülke</div>
        <div class="cell" style="background:#f0f0f0">Kıta</div>
        <div class="cell" style="background:#f0f0f0">Nüfus</div>
        <div class="cell" style="background:#f0f0f0">Alan</div>
        <div class="cell" style="background:#f0f0f0">Kıyı</div>
        <div class="cell" style="background:#f0f0f0">Komşu</div>
    </div>

    <script>
        const countryDB = [
            { ad: "Türkiye", kita: "Asya", nufus: "85 Mn", alan: "783 km²", kiyi: "Var", komsular: ["Yunanistan", "Bulgaristan"] },
            { ad: "Almanya", kita: "Avrupa", nufus: "84 Mn", alan: "357 km²", kiyi: "Var", komsular: ["Fransa", "Polonya"] }
        ];
        
        let target = countryDB[Math.floor(Math.random() * countryDB.length)];
        const input = document.getElementById('countryInput');

        function submitGuess() {
            const guess = countryDB.find(c => c.ad.toLowerCase() === input.value.toLowerCase());
            if (!guess) return alert("Bulunamadı!");
            
            const grid = document.getElementById('gameGrid');
            [guess.ad, guess.kita, guess.nufus, guess.alan, guess.kiyi, guess.komsular.includes(target.ad) ? "Komşu" : "Uzak"].forEach((val, i) => {
                const div = document.createElement('div');
                div.className = 'cell ' + (i === 0 && val === target.ad ? 'match' : 'mismatch');
                div.textContent = val;
                grid.appendChild(div);
            });
            input.value = '';
        }
    </script>
</body>
</html>
