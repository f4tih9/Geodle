<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Geodle - Coğrafya Oyunu</title>
    <style>
        :root { --bg-color: #f6f3ea; --border: #000; --match: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { position: relative; width: 100%; max-width: 600px; margin-bottom: 30px; }
        #countryInput { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        #suggestions { position: absolute; background: white; border: 2px solid var(--border); width: 100%; list-style: none; padding: 0; margin: 0; z-index: 10; border-radius: 0 0 8px 8px; }
        .sugg { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .sugg:hover { background: #f0f0f0; }
        .grid-layout { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; width: 100%; max-width: 800px; }
        .header-cell { color: #64748b; font-size: 13px; font-weight: bold; padding: 10px 0; border-bottom: 2px solid var(--border); text-align: center; }
        .cell { padding: 15px; border: 2px solid var(--border); border-radius: 6px; background: white; text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .match { background-color: var(--match) !important; color: white !important; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="countryInput" placeholder="Ülke adı gir..." autocomplete="off">
        <ul id="suggestions"></ul>
    </div>
    
    <div class="grid-layout" id="gameGrid">
        <div class="header-cell">Ülke</div>
        <div class="header-cell">Kıta</div>
        <div class="header-cell">Nüfus</div>
        <div class="header-cell">Alan</div>
        <div class="header-cell">Kıyı</div>
        <div class="header-cell">Komşu</div>
    </div>

    <script>
        const countryDB = [
            { ad: "Türkiye", kita: "Asya", nufus: "85.3 Mn", alan: "783 km²", kiyi: "Var", komsular: ["Yunanistan", "Bulgaristan"] },
            { ad: "Bulgaristan", kita: "Avrupa", nufus: "6.8 Mn", alan: "110 km²", kiyi: "Var", komsular: ["Türkiye", "Yunanistan"] }
        ];
        
        let target = countryDB[Math.floor(Math.random() * countryDB.length)];
        const input = document.getElementById('countryInput');
        const list = document.getElementById('suggestions');

        input.oninput = () => {
            list.innerHTML = '';
            const val = input.value.toLowerCase();
            if(!val) return;
            countryDB.filter(c => c.ad.toLowerCase().startsWith(val)).forEach(c => {
                const li = document.createElement('li');
                li.className = 'sugg'; li.textContent = c.ad;
                li.onclick = () => { input.value = c.ad; list.innerHTML = ''; };
                list.appendChild(li);
            });
        };

        input.onkeydown = (e) => {
            if(e.key === 'Enter') {
                const first = list.querySelector('li');
                if(first) input.value = first.textContent;
                submitGuess();
            }
        };

        function submitGuess() {
            const guess = countryDB.find(c => c.ad.toLowerCase() === input.value.toLowerCase());
            if(!guess) return;
            const grid = document.getElementById('gameGrid');
            [guess.ad, guess.kita, guess.nufus, guess.alan, guess.kiyi, guess.komsular.includes(target.ad) ? "Komşu" : "Uzak"].forEach((val, i) => {
                const d = document.createElement('div');
                d.className = 'cell ' + (i === 0 && val === target.ad ? 'match' : '');
                d.textContent = val;
                grid.appendChild(d);
            });
            input.value = ''; list.innerHTML = '';
        }
    </script>
</body>
</html>
