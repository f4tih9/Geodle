<!DOCTYPE html>
<html lang="tr" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <title>Geodle - Pro</title>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .controls { width: 100%; max-width: 500px; margin-bottom: 30px; position: relative; }
        #countryInput { width: 100%; padding: 15px; border: 2px solid #3b82f6; border-radius: 12px; background: #1e293b; color: white; font-size: 16px; outline: none; }
        
        /* Kart Tasarımı */
        .guess-card {
            background: #fff;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            color: #333;
            width: 100%;
            max-width: 500px;
        }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .country-info { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px; }
        .flag { width: 45px; height: 30px; border: 1px solid #ddd; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .box { border: 2px solid #000; padding: 8px; text-align: center; border-radius: 8px; font-weight: bold; font-size: 13px; }
        .match { background-color: #86efac; }
        .mismatch { background-color: #fca5a5; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="countryInput" placeholder="Ülke adı yaz..." autocomplete="off">
        <div id="suggestions" style="position:absolute; width:100%; background:#1e293b; border-radius:0 0 12px 12px; z-index:10;"></div>
    </div>
    
    <div id="gameGrid" style="width:100%; max-width:500px;"></div>

    <script>
        let countryDB = [];
        let target;
        let guessCount = 0;
        const input = document.getElementById('countryInput');

        fetch('countries.json')
            .then(r => r.json())
            .then(data => {
                countryDB = data;
                target = countryDB[Math.floor(Math.random() * countryDB.length)];
                console.log("Hedef ülke:", target.ad);
            });

        function submitGuess() {
            const val = input.value.toLocaleLowerCase('tr-TR').trim();
            const guess = countryDB.find(c => c.ad.toLocaleLowerCase('tr-TR') === val || c.ad_en.toLowerCase() === val);
            if (!guess) return;

            guessCount++;
            const grid = document.getElementById('gameGrid');
            const isSame = (guess.ad === target.ad);
            const isNeighbor = guess.komsular.includes(target.ad);

            const card = document.createElement('div');
            card.className = 'guess-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="country-info">
                        <img src="https://flagcdn.com/w40/${guess.kod}.png" class="flag">
                        ${guess.ad}
                    </div>
                    <div style="color: #666; font-weight:bold;">#${guessCount}</div>
                </div>
                <div class="grid">
                    <div class="box ${guess.kita === target.kita ? 'match' : 'mismatch'}">Kıta<br>${guess.kita}</div>
                    <div class="box ${guess.kiyi === target.kiyi ? 'match' : 'mismatch'}">Kıyı<br>${guess.kiyi}</div>
                    <div class="box ${isSame || isNeighbor ? 'match' : 'mismatch'}">Komşu<br>${isSame ? 'Kendisi' : (isNeighbor ? 'EVET' : 'HAYIR')}</div>
                    <div class="box">Nüfus<br>${guess.nufus > target.nufus ? '⬇️' : '⬆️'}</div>
                    <div class="box">Alan<br>${guess.alan > target.alan ? '⬇️' : '⬆️'}</div>
                    <div class="box" style="background:#ddd">Tahmin<br>${guessCount}</div>
                </div>
            `;
            grid.prepend(card);
            input.value = '';
        }

        input.onkeydown = (e) => { if(e.key === 'Enter') submitGuess(); };
    </script>
</body>
</html>
