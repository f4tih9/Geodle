<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ülke Tahmin | Geodle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f6f3ea; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .navbar { 
            width: 100%; 
            max-width: 800px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            border-bottom: 2px solid #000; 
            background-color: #fff;
            box-sizing: border-box;
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold; 
            text-decoration: none; 
            color: #000;
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            box-sizing: border-box;
        }
        .game-header {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        .input-group {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .guess-input {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border: 3px solid #000;
            border-radius: 12px;
            outline: none;
        }
        .guess-btn {
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            background-color: #50fa7b;
            color: #000;
            border: 3px solid #000;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .guess-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
        }
        .guesses-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .guess-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 15px 20px;
            border: 3px solid #000;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 3px 3px 0 #000;
        }
        .correct { 
            background-color: #50fa7b; 
        }
        .wrong { 
            background-color: #ff5555; 
            color: white; 
        }
    </style>
</head>
<body>

    <!-- Üst Menü -->
    <div class="navbar">
        <a href="index.html" class="logo">🌍 Ülke Tahmin</a>
        <a href="index.html" style="font-weight:bold; color:#000; text-decoration:none; border: 2px solid #000; padding: 5px 15px; border-radius: 15px; background: #fff;">Ana Sayfaya Dön</a>
    </div>

    <!-- Oyun Alanı -->
    <div class="container">
        <div class="game-header">Gizli Ülkeyi Bul!</div>
        <p style="margin-bottom: 20px; text-align: center; font-weight: 500;">Hedef ülkeyi tahmin et. (Cevap: Türkiye)</p>

        <div class="input-group">
            <input type="text" id="guessInput" class="guess-input" placeholder="Ülke adı yaz..." autocomplete="off">
            <button class="guess-btn" onclick="makeGuess()">Tahmin Et</button>
        </div>

        <!-- Tahminlerin Listeleneceği Alan -->
        <div id="guessesList" class="guesses-container">
            <!-- JavaScript ile yeni satırlar buraya eklenecek -->
        </div>
    </div>

    <script>
        // Oyunun asıl cevabı
        const secretCountry = "Türkiye";
        const guessesList = document.getElementById('guessesList');
        const inputField = document.getElementById('guessInput');

        // Enter tuşuna basıldığında butonun tıklanmasını sağlama
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                makeGuess();
            }
        });

        function makeGuess() {
            // Kullanıcının girdiği kelimeyi al ve sağdaki soldaki boşlukları sil
            const guess = inputField.value.trim();
            
            // Eğer boş bir şey girildiyse uyarı ver
            if (guess === "") {
                alert("Lütfen bir ülke adı girin!");
                return;
            }

            // Yeni bir tahmin satırı (div) oluştur
            const row = document.createElement('div');
            row.classList.add('guess-row');

            // Büyük/küçük harf duyarlılığını ortadan kaldırarak kontrol et
            if (guess.toLocaleLowerCase('tr-TR') === secretCountry.toLocaleLowerCase('tr-TR')) {
                row.classList.add('correct');
                row.innerHTML = `<span>${guess}</span> <span>🎉 Doğru!</span>`;
                
                // Doğru bilindikten sonra girdi alanını kapat
                inputField.disabled = true; 
                inputField.placeholder = "Tebrikler, buldun!";
                
                // Oyunu kazandı butonu gizle/kapat
                document.querySelector('.guess-btn').disabled = true;
                document.querySelector('.guess-btn').style.opacity = "0.5";
            } else {
                row.classList.add('wrong');
                row.innerHTML = `<span>${guess}</span> <span>❌ Yanlış</span>`;
            }

            // Yapılan tahmini listenin en üstüne ekle
            guessesList.prepend(row);
            
            // Bir sonraki tahmin için girdi kutusunu temizle
            inputField.value = "";
            inputField.focus(); // İmleci tekrar kutuya odakla
        }
    </script>
</body>
</html>
